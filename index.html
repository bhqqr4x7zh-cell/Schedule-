<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Хуваарь</title>

<style>
:root{
--bg1:#1a0a4a;
--bg2:#0d1a3a;
--card:rgba(255,255,255,.09);
--brd:rgba(255,255,255,.13);
--p:#a78bfa;
--tx:#f0eeff;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--tx);
}

.box{
padding:20px;
text-align:center;
}

.card{
background:var(--card);
border:1px solid var(--brd);
padding:20px;
border-radius:15px;
margin-top:20px;
}

button{
background:var(--p);
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<div class="box">
<h1>🌸 Хуваарь</h1>

<div class="card">
<p>Сайт одоо зөв ажиллаж байна 🎉</p>
<button onclick="alert('Амжилт!')">Тест</button>
</div>

</div>

</body>
</html>
