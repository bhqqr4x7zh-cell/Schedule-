<!DOCTYPE html>

<html lang="mn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="桜学生" />
<title>桜学生 2026</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    height: 100%;
  }
  body {
    --bg: #1a0a4a;
    --bg2: #0d1a3a;
    --card: #2a1a5e;
    --brd: #3d2a7a;
    --p: #a78bfa;
    --g: #34d399;
    --o: #fb923c;
    --r: #f87171;
    --tx: #f0eeff;
    --mu: #9988cc;
    --mu2: #5a4a8a;
    --navbg: #130838;
    --topbg: #130838;
  }
  body.th-light {
    --bg: #f0eeff;
    --bg2: #ddd8ff;
    --card: #ffffff;
    --brd: #c8c0f0;
    --p: #4a28c8;
    --g: #126e50;
    --o: #c85a0a;
    --r: #b81c38;
    --tx: #0c0a22;
    --mu: #6a6090;
    --mu2: #b0a8d0;
    --navbg: #e8e0ff;
    --topbg: #e8e0ff;
  }
  body.th-sakura {
    --bg: #2d0a1e;
    --bg2: #1a0d2e;
    --card: #3d1530;
    --brd: #6d2550;
    --p: #f472b6;
    --g: #34d399;
    --o: #fb923c;
    --r: #f87171;
    --tx: #ffe4f0;
    --mu: #cc88aa;
    --mu2: #6a3050;
    --navbg: #200818;
    --topbg: #200818;
  }
  body.th-ocean {
    --bg: #020f20;
    --bg2: #041830;
    --card: #062040;
    --brd: #0a3060;
    --p: #38bdf8;
    --g: #34d399;
    --o: #fb923c;
    --r: #f87171;
    --tx: #e0f4ff;
    --mu: #6aaccc;
    --mu2: #1a4060;
    --navbg: #010a16;
    --topbg: #010a16;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--tx);
    position: fixed;
    inset: 0;
    overflow: hidden;
  }
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
    overflow: hidden;
  }
  /* ... rest of CSS with fixed var(–p) → var(--p) and curly quotes → straight quotes ... */
  .topbar {
    padding: 12px 14px 10px;
    padding-top: max(12px, env(safe-area-inset-top));
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--topbg);
    border-bottom: 1px solid var(--brd);
    flex-shrink: 0;
    z-index:10;
  }
  .tb-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--p);
  }
  .tb-sub {
    font-size: 0.52rem;
    color: var(--mu);
    margin-top: 2px;
    letter-spacing: 0.07em;
  }
  .clock {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--p);
    background: var(--card);
    border: 1px solid var(--brd);
    border-radius: 18px;
    padding: 4px 12px;
    font-family: 'Courier New', monospace;
  }
  /* Similarly fix all other places */
</style>
</head>
<body id="abody">
<script>
  (function() {
    var t = localStorage.getItem('theme') || 'dark';
    document.getElementById('abody').className = 'th-' + t;
  })();
</script>
<div class="bg">
  <div class="orb o1" id="orb1"></div>
  <div class="orb o2" id="orb2"></div>
  <div class="orb o3" id="orb3"></div>
</div>
<div class="app">
  <div class="topbar">
    <div>
      <div class="tb-title" id="ptitle">Хичээлийн Хуваарь</div>
      <div class="tb-sub">🌸 2026 · ХАВРЫН СЕМЕСТР</div>
    </div>
    <div class="clock" id="clock">00:00</div>
  </div>
  <div class="content">

<script>
function todayStr() {
  var n = new Date();
  return n.getFullYear() + '-' + ('0'+(n.getMonth() + 1)).slice(-2) + '-' + ('0' + n.getDate()).slice(-2);
}
function tstr() {
  var n = new Date();
  return n.getFullYear() + '-' + ('0'+(n.getMonth() + 1)).slice(-2) + '-' + ('0' + n.getDate()).slice(-2);
}
</script>

<!-- End content -->
  </div><!-- /content -->

  <!-- Navigation and modal unchanged -->

</div>
